<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Konjyosom Tech Solutions</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary: #0ea5e9;
            --primary-dark: #0284c7;
            --secondary: #64748b;
            --accent: #f59e0b;
            --success: #10b981;
            --bg: #f8fafc;
            --bg-white: #ffffff;
            --text: #1e293b;
            --text-light: #64748b;
            --border: #e2e8f0;
            --shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -2px rgba(0,0,0,0.05);
            --shadow-lg: 0 20px 25px -5px rgba(0,0,0,0.08), 0 8px 10px -6px rgba(0,0,0,0.05);
            --radius: 16px;
            --radius-sm: 8px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 50%, #f8fafc 100%);
            min-height: 100vh;
            color: var(--text);
            line-height: 1.6;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            background: white;
            border-radius: var(--radius);
            padding: 40px;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border);
            width: 100%;
            max-width: 420px;
        }
        .logo {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            text-decoration: none; margin-bottom: 30px;
        }
        .logo-img {
            width: 48px; height: 48px;
            border-radius: 12px; object-fit: contain;
        }
        .logo-text {
            font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 1.6rem;
            color: var(--text);
        }
        .logo-text span { color: var(--primary); }
        .login-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            text-align: center;
            margin-bottom: 8px;
        }
        .login-subtitle {
            color: var(--text-light);
            text-align: center;
            margin-bottom: 28px;
            font-size: 14px;
        }
        .form-group { margin-bottom: 18px; }
        .form-group label {
            display: block; margin-bottom: 6px;
            font-weight: 500; font-size: 14px;
        }
        .form-group input {
            width: 100%; padding: 13px 15px;
            background: var(--bg); border: 1px solid var(--border);
            border-radius: var(--radius-sm); color: var(--text);
            font-size: 15px; transition: all 0.3s; font-family: inherit;
        }
        .form-group input:focus {
            outline: none; border-color: var(--primary); background: white;
            box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.1);
        }
        .submit-btn {
            background: var(--primary); color: white; border: none;
            padding: 14px 28px; border-radius: var(--radius-sm);
            font-size: 16px; font-weight: 600; cursor: pointer; width: 100%;
            transition: all 0.3s; display: flex; align-items: center;
            justify-content: center; gap: 8px; margin-top: 10px;
        }
        .submit-btn:hover { background: var(--primary-dark); transform: translateY(-2px); }
        .submit-btn:disabled { opacity: 0.7; cursor: not-allowed; }
        .back-link {
            text-align: center; margin-top: 20px;
        }
        .back-link a {
            color: var(--text-light); text-decoration: none; font-weight: 500;
            padding: 10px 22px; border-radius: 50px; background: var(--bg);
            border: 1px solid var(--border); transition: all 0.3s;
            display: inline-flex; align-items: center; gap: 8px; font-size: 14px;
        }
        .back-link a:hover {
            border-color: var(--primary); color: var(--primary); box-shadow: var(--shadow);
        }
        .notification {
            position: fixed; top: 20px; right: 20px;
            padding: 14px 22px; border-radius: 10px;
            color: white; font-weight: 600; z-index: 10000;
            animation: slideIn 0.3s ease; box-shadow: var(--shadow-lg);
            max-width: 380px; font-size: 14px;
        }
        .notification.success { background: var(--success); }
        .notification.error { background: #ef4444; }
        @keyframes slideIn {
            from { transform: translateX(400px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .role-badge {
            display: inline-flex; align-items: center; gap: 6px;
            background: var(--danger); color: white;
            padding: 6px 14px; border-radius: 20px;
            font-size: 12px; font-weight: 600; margin-bottom: 20px;
        }
        .tech-link {
            text-align: center; margin-top: 15px;
            font-size: 13px;
        }
        .tech-link a {
            color: var(--primary); text-decoration: none;
            font-weight: 500;
        }
        .tech-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="login-card">
        <a href="index.html" class="logo">
            <img src="assets/logo.png" alt="Konjyosom Tech Solutions" class="logo-img">
            <div class="logo-text">Konjyosom <span>Tech</span></div>
        </a>
        <div style="text-align:center;">
            <span class="role-badge"><i class="fas fa-shield-alt"></i> Admin Portal</span>
        </div>
        <h3 class="login-title"><i class="fas fa-lock"></i> Admin Sign In</h3>
        <p class="login-subtitle">Access the admin dashboard</p>

        <form id="loginForm">
            <div class="form-group">
                <label>Admin Password</label>
                <input type="password" id="password" placeholder="Enter admin password" required>
            </div>
            <button type="submit" class="submit-btn" id="submitBtn">
                <i class="fas fa-sign-in-alt"></i> Sign In
            </button>
        </form>

        <div class="back-link">
            <a href="index.html"><i class="fas fa-arrow-left"></i> Back to Website</a>
        </div>
        <div class="tech-link">
            <a href="technician-login.html"><i class="fas fa-wrench"></i> Technician Login</a>
        </div>
    </div>

    <script>
        const API_BASE = 'https://konjyosom-website-updated.onrender.com/api';

        // Keep-alive ping to prevent Render cold start (free tier sleeps after 15 min inactivity)
        async function pingServer() {
            try {
                await fetch(`${API_BASE}/health`, { method: 'HEAD', mode: 'no-cors' });
            } catch(e) {}
        }
        pingServer();
        setInterval(pingServer, 300000); // ping every 5 minutes

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const originalText = btn.innerHTML;

            showLoader('Connecting to server...');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in...';
            btn.disabled = true;

            const data = {
                password: document.getElementById('password').value
            };

            try {
                // Abort controller with 15 second timeout
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 15000);

                const res = await fetch(`${API_BASE}/auth/admin-login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data),
                    signal: controller.signal
                });
                clearTimeout(timeoutId);

                if (!res.ok) throw new Error(`Server error: ${res.status}`);

                const result = await res.json();

                if (result.success) {
                    localStorage.setItem('kts_token', result.token);
                    localStorage.setItem('kts_role', result.role);
                    showNotification('Login successful! Redirecting...', 'success');
                    setTimeout(() => {
                        window.location.href = 'admin-dashboard.html';
                    }, 800);
                } else {
                    showNotification(result.message || 'Invalid password', 'error');
                }
            } catch (error) {
                if (error.name === 'AbortError') {
                    showNotification('Server is waking up. Please try again in 30 seconds.', 'error');
                } else {
                    showNotification('Network error. Please check your connection.', 'error');
                }
            } finally {
                hideLoader();
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });

        function showLoader(text) {
            const existing = document.getElementById('pageLoader');
            if (existing) existing.remove();
            const loader = document.createElement('div');
            loader.id = 'pageLoader';
            loader.innerHTML = `
                <div style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(255,255,255,0.95);z-index:99999;
                            display:flex;flex-direction:column;align-items:center;justify-content:center;gap:15px;">
                    <div style="width:50px;height:50px;border:4px solid #e2e8f0;border-top-color:#0ea5e9;border-radius:50%;
                                animation:spin 1s linear infinite;"></div>
                    <p style="color:#64748b;font-weight:500;">${text}</p>
                </div>
                <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
            `;
            document.body.appendChild(loader);
        }

        function hideLoader() {
            const loader = document.getElementById('pageLoader');
            if (loader) loader.remove();
        }

        function showNotification(message, type) {
            const existing = document.querySelector('.notification');
            if (existing) existing.remove();
            const notif = document.createElement('div');
            notif.className = `notification ${type}`;
            notif.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i> ${message}`;
            document.body.appendChild(notif);
            setTimeout(() => notif.remove(), 4000);
        }
    </script>
</body>
</html>
