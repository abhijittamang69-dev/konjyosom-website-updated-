<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Booking - Konjyosom Tech Solutions Pvt. Ltd.</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary: #0ea5e9;
            --primary-dark: #0284c7;
            --secondary: #64748b;
            --accent: #f59e0b;
            --success: #10b981;
            --bg: #f8fafc;
            --bg-white: #ffffff;
            --text: #1e293b;
            --text-light: #64748b;
            --border: #e2e8f0;
            --shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -2px rgba(0,0,0,0.05);
            --shadow-lg: 0 20px 25px -5px rgba(0,0,0,0.08), 0 8px 10px -6px rgba(0,0,0,0.05);
            --radius: 16px;
            --radius-sm: 8px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 50%, #f8fafc 100%);
            min-height: 100vh;
            color: var(--text);
            line-height: 1.6;
        }
        .header {
            text-align: center;
            padding: 50px 20px 20px;
        }
        .header .logo {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            text-decoration: none; margin-bottom: 15px;
        }
        .logo-img {
            width: 48px; height: 48px;
            border-radius: 12px; object-fit: contain;
        }
        .logo-text {
            font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 1.6rem;
            color: var(--text);
        }
        .logo-text span { color: var(--primary); }
        .header h1 {
            font-family: 'Outfit', sans-serif; font-size: 1.8rem; margin-bottom: 6px;
        }
        .header p { color: var(--text-light); font-size: 15px; }
        .nav-back {
            text-align: center; margin-bottom: 30px;
        }
        .nav-back a {
            color: var(--text-light); text-decoration: none; font-weight: 500;
            padding: 10px 22px; border-radius: 50px; background: white;
            border: 1px solid var(--border); transition: all 0.3s;
            display: inline-flex; align-items: center; gap: 8px; font-size: 14px;
        }
        .nav-back a:hover {
            border-color: var(--primary); color: var(--primary); box-shadow: var(--shadow);
        }
        .main-container {
            max-width: 550px; margin: 0 auto; padding: 0 20px 40px;
        }
        .form-card {
            background: white; border-radius: var(--radius); padding: 40px;
            box-shadow: var(--shadow-lg); border: 1px solid var(--border);
        }
        .section-title {
            font-family: 'Outfit', sans-serif; font-size: 1.5rem;
            text-align: center; margin-bottom: 8px;
        }
        .section-subtitle {
            color: var(--text-light); text-align: center;
            margin-bottom: 28px; font-size: 14px;
        }
        .form-group { margin-bottom: 18px; }
        .form-group label {
            display: block; margin-bottom: 6px;
            font-weight: 500; font-size: 14px;
        }
        .form-group input {
            width: 100%; padding: 13px 15px;
            background: var(--bg); border: 1px solid var(--border);
            border-radius: var(--radius-sm); color: var(--text);
            font-size: 15px; transition: all 0.3s; font-family: inherit;
        }
        .form-group input:focus {
            outline: none; border-color: var(--primary); background: white;
        }
        .submit-btn {
            background: var(--primary); color: white; border: none;
            padding: 14px 28px; border-radius: var(--radius-sm);
            font-size: 16px; font-weight: 600; cursor: pointer; width: 100%;
            transition: all 0.3s; display: flex; align-items: center;
            justify-content: center; gap: 8px;
        }
        .submit-btn:hover { background: var(--primary-dark); transform: translateY(-2px); }
        .submit-btn:disabled { opacity: 0.7; cursor: not-allowed; }
        .notification {
            position: fixed; top: 20px; right: 20px;
            padding: 14px 22px; border-radius: 10px;
            color: white; font-weight: 600; z-index: 10000;
            animation: slideIn 0.3s ease; box-shadow: var(--shadow-lg);
            max-width: 380px; font-size: 14px;
        }
        .notification.success { background: var(--success); }
        .notification.error { background: #ef4444; }
        @keyframes slideIn {
            from { transform: translateX(400px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        footer {
            text-align: center; padding: 30px;
            color: var(--text-light); font-size: 14px;
            border-top: 1px solid var(--border); margin-top: 40px;
        }
        footer a { color: var(--primary); text-decoration: none; }
        @media (max-width: 768px) {
            .form-card { padding: 28px; }
            .header h1 { font-size: 1.4rem; }
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="index.html" class="logo">
            <img src="assets/logo.png" alt="Konjyosom Tech Solutions" class="logo-img">
            <div class="logo-text">Konjyosom <span>Tech</span></div>
        </a>
        <h1><i class="fas fa-search"></i> Track Your Booking</h1>
        <p>Enter your reference number to check installation status</p>
    </div>
    <div class="nav-back">
        <a href="index.html"><i class="fas fa-arrow-left"></i> Back to Website</a>
    </div>
    <div class="main-container">
        <div class="form-card">
            <h3 class="section-title"><i class="fas fa-search"></i> Track Booking</h3>
            <p class="section-subtitle">
                Enter your booking reference (e.g., BK-12345678) to check status.
            </p>
            <form id="tracking-form">
                <div class="form-group">
                    <label>Reference Number *</label>
                    <input type="text" name="reference" required
                        placeholder="e.g., BK-12345678"
                        style="text-transform: uppercase; font-family: monospace;"
                        maxlength="20">
                </div>
                <div class="form-group">
                    <label>Email (verification)</label>
                    <input type="email" name="email" placeholder="your@email.com">
                </div>
                <button type="submit" class="submit-btn">
                    <i class="fas fa-search"></i> Track Booking
                </button>
            </form>
            <div id="tracking-result"></div>
        </div>
    </div>
    <footer>
        <p>© 2026 Konjyosom Tech Solutions Pvt. Ltd.</p>
        <p>Phone: <a href="tel:+9779865057546">+977 9865057546</a> |
           Email: <a href="mailto:abhijittamang69@gmail.com">abhijittamang69@gmail.com</a></p>
    </footer>
    <script>
        const API_BASE = 'https://konjyosom-website-updated.onrender.com/api';
        document.getElementById('tracking-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = this.querySelector('.submit-btn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Searching...';
            btn.disabled = true;
            const fd = new FormData(this);
            const ref = fd.get('reference').trim().toUpperCase();
            const email = fd.get('email').trim();
            const resultDiv = document.getElementById('tracking-result');
            resultDiv.innerHTML = '<div style="text-align:center;padding:30px;"><i class="fas fa-spinner fa-spin" style="font-size:2rem;color:#0ea5e9;"></i><p style="margin-top:15px;color:#64748b;">Searching...</p></div>';
            try {
                let found = null;
                try {
                    let r = await fetch(`${API_BASE}/bookings/track?ref=${ref}&email=${encodeURIComponent(email)}`);
                    if (r.ok) { let d = await r.json(); if (d.found) found = { type: 'booking', data: d.booking }; }
                } catch (e) {}
                if (!found) {
                    try {
                        let r = await fetch(`${API_BASE}/enquiries/track?ref=${ref}&email=${encodeURIComponent(email)}`);
                        if (r.ok) { let d = await r.json(); if (d.found) found = { type: 'enquiry', data: d.enquiry }; }
                    } catch (e) {}
                }
                if (!found) {
                    const lb = JSON.parse(localStorage.getItem('bookings') || '[]');
                    const le = JSON.parse(localStorage.getItem('enquiries') || '[]');
                    const b = lb.find(x => x.reference === ref || x.id === ref);
                    if (b) found = { type: 'booking', data: b };
                    const en = le.find(x => x.reference === ref || x.id === ref);
                    if (en) found = { type: 'enquiry', data: en };
                }
                if (found) {
                    resultDiv.innerHTML = renderResult(found);
                } else {
                    resultDiv.innerHTML = '<div style="background:#fef2f2;border:1px solid #fecaca;color:#dc2626;padding:20px;border-radius:10px;margin-top:20px;text-align:center;"><i class="fas fa-exclamation-circle" style="font-size:2rem;margin-bottom:10px;"></i><br><strong>Not found</strong><br><small style="color:#64748b;">Check your reference number.</small></div>';
                }
            } catch (err) {
                resultDiv.innerHTML = '<div style="background:#fef2f2;border:1px solid #fecaca;color:#dc2626;padding:20px;border-radius:10px;margin-top:20px;text-align:center;"><i class="fas fa-exclamation-triangle"></i> Error. Try again.</div>';
            } finally {
                btn.innerHTML = '<i class="fas fa-search"></i> Track Booking';
                btn.disabled = false;
            }
        });
        function renderResult(result) {
            const item = result.data;
            const isBooking = result.type === 'booking';
            const sc = { pending: '#f59e0b', confirmed: '#22c55e', completed: '#3b82f6', cancelled: '#ef4444', new: '#3b82f6', 'in-progress': '#8b5cf6', resolved: '#22c55e' };
            const c = sc[item.status?.toLowerCase()] || '#64748b';
            return `<div style="background:#fff;border:1px solid var(--border);border-radius:15px;padding:25px;margin-top:20px;box-shadow:var(--shadow);"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px;"><h3 style="margin:0;font-family:'Outfit',sans-serif;"><i class="fas fa-${isBooking?'calendar-check':'envelope'}"></i> ${isBooking?'Installation':'Enquiry'}</h3><span style="background:${c}15;color:${c};padding:5px 14px;border-radius:20px;font-weight:600;font-size:12px;text-transform:uppercase;">${item.status?.toUpperCase()||'PENDING'}</span></div><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin-bottom:15px;"><div style="background:#f8fafc;padding:12px;border-radius:8px;"><small style="color:#64748b;display:block;margin-bottom:3px;">Ref</small><strong style="font-family:monospace;font-size:14px;">${item.reference||item.id}</strong></div><div style="background:#f8fafc;padding:12px;border-radius:8px;"><small style="color:#64748b;display:block;margin-bottom:3px;">Name</small><strong>${item.name}</strong></div><div style="background:#f8fafc;padding:12px;border-radius:8px;"><small style="color:#64748b;display:block;margin-bottom:3px;">Email</small><strong>${item.email}</strong></div><div style="background:#f8fafc;padding:12px;border-radius:8px;"><small style="color:#64748b;display:block;margin-bottom:3px;">Phone</small><strong>${item.phone||'N/A'}</strong></div></div>${isBooking?`<div style="background:#f8fafc;padding:12px;border-radius:8px;margin-bottom:10px;"><small style="color:#64748b;display:block;margin-bottom:3px;">Service</small><strong>${item.service||'N/A'}</strong></div><div style="background:#f8fafc;padding:12px;border-radius:8px;margin-bottom:10px;"><small style="color:#64748b;display:block;margin-bottom:3px;">Date</small><strong>${item.preferredDate?new Date(item.preferredDate).toLocaleDateString():'N/A'}</strong></div>`:`<div style="background:#f8fafc;padding:12px;border-radius:8px;margin-bottom:10px;"><small style="color:#64748b;display:block;margin-bottom:3px;">Subject</small><strong>${item.subject||'N/A'}</strong></div>`}<div style="background:#f8fafc;padding:12px;border-radius:8px;margin-bottom:10px;"><small style="color:#64748b;display:block;margin-bottom:3px;">Message</small><p style="margin:0;line-height:1.5;font-size:14px;">${item.message||'No details'}</p></div><div style="background:#f8fafc;padding:12px;border-radius:8px;"><small style="color:#64748b;display:block;margin-bottom:3px;">Submitted</small><strong>${item.createdAt?new Date(item.createdAt).toLocaleString():'N/A'}</strong></div><div style="margin-top:18px;padding-top:15px;border-top:1px solid var(--border);text-align:center;"><p style="color:#64748b;margin:0;font-size:13px;"><i class="fas fa-info-circle"></i> Need help? Call <a href="tel:+9779865057546" style="color:#0ea5e9;">+977 9865057546</a></p></div></div>`;
        }
    </script>
</body>
</html>
